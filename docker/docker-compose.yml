services:
  # ─────────────────────────────────────────────
  # AetherClaw Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm aetherclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  aetherclaw-agent:
    image: docker.io/aetherclaw/aetherclaw:latest
    container_name: aetherclaw-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.aetherclaw
    entrypoint: ["aetherclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # AetherClaw Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml up aetherclaw-gateway
  # ─────────────────────────────────────────────
  aetherclaw-gateway:
    image: docker.io/aetherclaw/aetherclaw:latest
    container_name: aetherclaw-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.aetherclaw
