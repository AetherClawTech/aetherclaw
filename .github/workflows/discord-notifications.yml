name: Discord Notifications

on:
  push:
    branches: ['**']
  pull_request_target:
    types: [opened, closed, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, closed, reopened]
  issue_comment:
    types: [created]
  release:
    types: [published]
  create:

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Push notification
        if: github.event_name == 'push' && env.DISCORD_WEBHOOK != ''
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_ID: ${{ github.event.head_commit.id }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.username || github.event.head_commit.author.name }}
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          COMMIT_COUNT=$(echo "$COMMITS_JSON" | jq 'length')
          SHORT_SHA="${COMMIT_ID:0:7}"
          SAFE_MSG=$(echo "$COMMIT_MSG" | head -1 | cut -c1-100 | jq -Rs '.')

          jq -n \
            --arg title "[${GITHUB_REPOSITORY}:${BRANCH}] ${COMMIT_COUNT} new commit(s)" \
            --arg url "$COMMIT_URL" \
            --arg desc "[\`${SHORT_SHA}\`](${COMMIT_URL}) $(echo "$COMMIT_MSG" | head -1 | cut -c1-100) — ${COMMIT_AUTHOR}" \
            '{"embeds":[{"title":$title,"url":$url,"description":$desc,"color":7506394}]}' \
            | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"

      - name: PR notification
        if: github.event_name == 'pull_request_target' && env.DISCORD_WEBHOOK != ''
        env:
          PR_ACTION: ${{ github.event.action }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_ADDITIONS: ${{ github.event.pull_request.additions }}
          PR_DELETIONS: ${{ github.event.pull_request.deletions }}
          PR_FILES: ${{ github.event.pull_request.changed_files }}
        run: |
          if [ "$PR_ACTION" = "closed" ] && [ "$PR_MERGED" = "true" ]; then
            LABEL="merged"; COLOR=8311585
          elif [ "$PR_ACTION" = "closed" ]; then
            LABEL="closed"; COLOR=15158332
          elif [ "$PR_ACTION" = "opened" ]; then
            LABEL="opened"; COLOR=3066993
          elif [ "$PR_ACTION" = "synchronize" ]; then
            LABEL="updated"; COLOR=15844367
          elif [ "$PR_ACTION" = "ready_for_review" ]; then
            LABEL="ready for review"; COLOR=3447003
          else
            LABEL="$PR_ACTION"; COLOR=9807270
          fi

          jq -n \
            --arg title "[${GITHUB_REPOSITORY}] PR #${PR_NUM} ${LABEL}" \
            --arg url "$PR_URL" \
            --arg desc "**${PR_TITLE}**\nby ${PR_AUTHOR} — +${PR_ADDITIONS} -${PR_DELETIONS} (${PR_FILES} files)" \
            --argjson color "$COLOR" \
            '{"embeds":[{"title":$title,"url":$url,"description":$desc,"color":$color}]}' \
            | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"

      - name: PR review notification
        if: github.event_name == 'pull_request_review' && env.DISCORD_WEBHOOK != ''
        env:
          REVIEW_STATE: ${{ github.event.review.state }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REVIEW_URL: ${{ github.event.review.html_url }}
          REVIEWER: ${{ github.event.review.user.login }}
          REVIEW_BODY: ${{ github.event.review.body }}
        run: |
          if [ "$REVIEW_STATE" = "approved" ]; then
            LABEL="approved"; COLOR=3066993
          elif [ "$REVIEW_STATE" = "changes_requested" ]; then
            LABEL="changes requested"; COLOR=15158332
          else
            LABEL="commented"; COLOR=9807270
          fi

          BODY_PREVIEW=$(echo "$REVIEW_BODY" | head -3 | cut -c1-200)

          jq -n \
            --arg title "[${GITHUB_REPOSITORY}] PR #${PR_NUM} review: ${LABEL}" \
            --arg url "$REVIEW_URL" \
            --arg desc "**${PR_TITLE}**\nby ${REVIEWER}\n\n${BODY_PREVIEW}" \
            --argjson color "$COLOR" \
            '{"embeds":[{"title":$title,"url":$url,"description":$desc,"color":$color}]}' \
            | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"

      - name: Review comment notification
        if: github.event_name == 'pull_request_review_comment' && env.DISCORD_WEBHOOK != ''
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_FILE: ${{ github.event.comment.path }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          BODY_PREVIEW=$(echo "$COMMENT_BODY" | head -3 | cut -c1-300)

          jq -n \
            --arg title "[${GITHUB_REPOSITORY}] PR #${PR_NUM} inline comment" \
            --arg url "$COMMENT_URL" \
            --arg desc "**${COMMENT_FILE}**\nby ${COMMENT_AUTHOR}\n\n${BODY_PREVIEW}" \
            '{"embeds":[{"title":$title,"url":$url,"description":$desc,"color":9807270}]}' \
            | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"

      - name: Issue notification
        if: github.event_name == 'issues' && env.DISCORD_WEBHOOK != ''
        env:
          ISSUE_ACTION: ${{ github.event.action }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          if [ "$ISSUE_ACTION" = "opened" ]; then
            COLOR=3066993
          elif [ "$ISSUE_ACTION" = "closed" ]; then
            COLOR=15158332
          else
            COLOR=9807270
          fi

          jq -n \
            --arg title "[${GITHUB_REPOSITORY}] Issue #${ISSUE_NUM} ${ISSUE_ACTION}" \
            --arg url "$ISSUE_URL" \
            --arg desc "**${ISSUE_TITLE}**\nby ${ISSUE_AUTHOR}" \
            --argjson color "$COLOR" \
            '{"embeds":[{"title":$title,"url":$url,"description":$desc,"color":$color}]}' \
            | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"

      - name: Issue comment notification
        if: github.event_name == 'issue_comment' && env.DISCORD_WEBHOOK != ''
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          BODY_PREVIEW=$(echo "$COMMENT_BODY" | head -3 | cut -c1-300)

          jq -n \
            --arg title "[${GITHUB_REPOSITORY}] Comment on #${ISSUE_NUM}" \
            --arg url "$COMMENT_URL" \
            --arg desc "by ${COMMENT_AUTHOR}\n\n${BODY_PREVIEW}" \
            '{"embeds":[{"title":$title,"url":$url,"description":$desc,"color":9807270}]}' \
            | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"

      - name: Release notification
        if: github.event_name == 'release' && env.DISCORD_WEBHOOK != ''
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_AUTHOR: ${{ github.event.release.author.login }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          BODY_PREVIEW=$(echo "$RELEASE_BODY" | head -5 | cut -c1-500)

          jq -n \
            --arg title "[${GITHUB_REPOSITORY}] Release ${RELEASE_TAG}" \
            --arg url "$RELEASE_URL" \
            --arg desc "**${RELEASE_NAME}**\nby ${RELEASE_AUTHOR}\n\n${BODY_PREVIEW}" \
            '{"embeds":[{"title":$title,"url":$url,"description":$desc,"color":15844367}]}' \
            | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"

      - name: Branch/tag created notification
        if: github.event_name == 'create' && env.DISCORD_WEBHOOK != ''
        run: |
          jq -n \
            --arg title "[${GITHUB_REPOSITORY}] ${{ github.event.ref_type }} created: ${{ github.event.ref }}" \
            --arg url "https://github.com/${GITHUB_REPOSITORY}" \
            --arg desc "by ${GITHUB_ACTOR}" \
            '{"embeds":[{"title":$title,"url":$url,"description":$desc,"color":3447003}]}' \
            | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"
